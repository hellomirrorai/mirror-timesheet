<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mirror. timesheet</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Body ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: #f0f0f0;
      color: #000;
    }

    /* ── Top Bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 16px;
    }

    #topbar h1 {
      font-size: 13px;
      font-weight: 600;
      margin-right: auto;
    }

    /* ── Buttons ── */
    button,
    .btn-like {
      padding: 6px 14px;
      font-size: 12px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover,
    .btn-like:hover {
      background: #000;
      color: #fff;
    }

    #btn-print {
      background: #000;
      color: #fff;
    }

    #btn-print:hover {
      background: #333;
    }

    /* ── App Layout ── */
    #app {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 41px);
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 16px;
    }

    .filter-group {
      margin-bottom: 20px;
    }

    .filter-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #333;
      margin-bottom: 6px;
    }

    .filter-group input[type="date"],
    .filter-group input[type="text"],
    .filter-group select {
      width: 100%;
      padding: 4px 6px;
      font-size: 12px;
      border: 1px solid #ccc;
    }

    .filter-group input[type="date"] + input[type="date"] {
      margin-top: 4px;
    }

    #toggl-token, #toggl-workspace {
      width: 100%;
      padding: 4px 6px;
      font-size: 12px;
      border: 1px solid #ccc;
      margin-bottom: 0;
      font-family: inherit;
    }
    #toggl-status {
      font-size: 11px;
      color: #555;
      min-height: 14px;
      line-height: 1.4;
    }

    .checkbox-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 140px;
      overflow-y: auto;
    }

    .checkbox-list label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .toggle-all {
      font-size: 10px;
      color: #666;
      text-decoration: underline;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-top: 4px;
    }

    .toggle-all:hover {
      background: none;
      color: #000;
    }

    /* ── Preview Wrap ── */
    #preview-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Drop Overlay ── */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.85);
      border: 3px dashed #000;
      z-index: 100;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: 700;
      pointer-events: none;
    }

    #drop-overlay.active {
      display: flex;
    }

    /* ── Empty State ── */
    #empty-state {
      display: flex;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      color: #999;
      text-align: center;
    }

    #empty-state p:first-child {
      font-size: 15px;
    }

    #empty-state p:last-child {
      font-size: 12px;
    }

    /* ── Report Card ── */
    #report {
      display: none;
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      padding: 20mm;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.12);
    }

    .report-logo {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .report-logo-rule {
      border: none;
      border-top: 1px solid #000;
      margin-bottom: 14px;
    }

    .report-title {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .report-project {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .report-period {
      font-size: 13px;
      color: #444;
      margin-bottom: 16px;
    }

    .report-total-hours {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .entries-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    /* ── Entries Table ── */
    .entries-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .entries-table th {
      text-align: left;
      padding: 5px 6px 5px 0;
      font-weight: 700;
      font-size: 11px;
      border-bottom: 2px solid #000;
    }

    .entries-table th:last-child {
      text-align: right;
    }

    tr.entry-row td {
      padding: 5px 6px 5px 0;
      border-bottom: 0.5px solid #bbb;
      vertical-align: top;
    }

    tr.entry-row td:last-child {
      text-align: right;
    }

    tr.group-start td {
      border-top: 2px solid #000;
    }

    tr.total-row td {
      border-top: 2px solid #000;
      border-bottom: none;
      padding-top: 7px;
      font-weight: 700;
    }

    /* ── Print / PDF ── */
    @media print {
      body {
        background: #fff;
      }

      #topbar,
      #sidebar,
      #drop-overlay {
        display: none !important;
      }

      #app {
        display: block;
        height: auto;
      }

      #preview-wrap {
        padding: 0;
        display: block;
      }

      #report {
        display: block !important;
        width: 100%;
        min-height: auto;
        padding: 0;
        box-shadow: none;
      }

      @page {
        size: A4 portrait;
        margin: 20mm;
      }

      .entries-table {
        page-break-inside: auto;
      }

      .entries-table tr {
        page-break-inside: avoid;
      }
      #toggl-section { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div id="topbar">
    <h1 id="topbar-title">mirror. timesheet</h1>
    <label id="btn-upload" class="btn-like" for="file-input">Carica CSV</label>
    <input type="file" id="file-input" accept=".csv" style="display:none">
    <button id="btn-print">Stampa / PDF</button>
  </div>

  <!-- Drop Overlay -->
  <div id="drop-overlay">Rilascia il CSV qui</div>

  <!-- App -->
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">

      <div id="toggl-section">
        <h2 style="margin-bottom:10px;">Toggl Live</h2>
        <div class="filter-group" style="margin-bottom:8px;">
          <span class="filter-label">API Token</span>
          <input type="password" id="toggl-token" placeholder="da Profilo → API Token" autocomplete="off">
        </div>
        <div class="filter-group" style="margin-bottom:8px;">
          <span class="filter-label">Workspace ID</span>
          <input type="text" id="toggl-workspace" placeholder="es. 1234567" autocomplete="off">
        </div>
        <div class="filter-group" style="margin-bottom:8px;">
          <span class="filter-label">Da</span>
          <input type="date" id="toggl-from">
        </div>
        <div class="filter-group" style="margin-bottom:8px;">
          <span class="filter-label">A</span>
          <input type="date" id="toggl-to">
        </div>
        <button id="btn-toggl-load" style="width:100%;margin-bottom:6px;">&#9654; Carica da Toggl</button>
        <div id="toggl-status"></div>
        <hr style="margin:14px 0;border:none;border-top:1px solid #e0e0e0;">
      </div>

      <!-- Filter: Date -->
      <div class="filter-group">
        <span class="filter-label">Data</span>
        <input type="date" id="filter-date-from" title="Da">
        <input type="date" id="filter-date-to" title="A">
      </div>

      <!-- Filter: Progetto -->
      <div class="filter-group">
        <span class="filter-label">Progetto</span>
        <select id="filter-project"></select>
      </div>

      <!-- Filter: Membro -->
      <div class="filter-group">
        <span class="filter-label">Membro</span>
        <div class="checkbox-list" id="filter-members"></div>
        <button class="toggle-all" data-target="members">seleziona tutto</button>
      </div>

      <!-- Filter: Hub / Client -->
      <div class="filter-group">
        <span class="filter-label">Hub / Client</span>
        <div class="checkbox-list" id="filter-clients"></div>
        <button class="toggle-all" data-target="clients">seleziona tutto</button>
      </div>

      <!-- Filter: Tag / Phase -->
      <div class="filter-group">
        <span class="filter-label">Tag / Phase</span>
        <div class="checkbox-list" id="filter-tags"></div>
        <button class="toggle-all" data-target="tags">seleziona tutto</button>
      </div>

    </aside>

    <!-- Preview Wrap -->
    <main id="preview-wrap">

      <!-- Empty State -->
      <div id="empty-state">
        <p>Trascina qui un file CSV Toggl</p>
        <p>oppure clicca &ldquo;Carica CSV&rdquo; in alto</p>
      </div>

      <!-- Report Card -->
      <div id="report">
        <div class="report-logo">mirror.</div>
        <hr class="report-logo-rule">
        <div class="report-title">Timesheet</div>
        <div id="rpt-project" class="report-project"></div>
        <div id="rpt-period" class="report-period"></div>
        <div id="rpt-total" class="report-total-hours"></div>
        <div class="entries-title">Time Entries</div>
        <table class="entries-table">
          <thead>
            <tr>
              <th>Phase</th>
              <th>Member</th>
              <th>Description</th>
              <th>Date</th>
              <th>Start</th>
              <th>End</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody id="rpt-tbody"></tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    /* ══════════════════════════════════
       CSV PARSER
       ══════════════════════════════════ */

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = splitCSVLine(lines[0]).map(h => h.trim());
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = splitCSVLine(lines[i]);
        const row = {};
        headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
        rows.push(row);
      }
      return rows;
    }

    function splitCSVLine(line) {
      const result = [];
      let cur = '';
      let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else { inQ = !inQ; }
        } else if (ch === ',' && !inQ) {
          result.push(cur); cur = '';
        } else {
          cur += ch;
        }
      }
      result.push(cur);
      return result;
    }

    /* ── Formatting helpers ── */

    function durationToSec(str) {
      if (!str) return 0;
      const p = str.split(':').map(Number);
      return (p[0] || 0) * 3600 + (p[1] || 0) * 60 + (p[2] || 0);
    }

    function secToHHMM(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      return h + ':' + String(m).padStart(2, '0');
    }

    function fmtDate(str) {             // "YYYY-MM-DD" → "DD/MM/YYYY"
      if (!str) return '';
      const [y, mo, d] = str.split('-');
      return d + '/' + mo + '/' + y;
    }

    function fmtTime(str) {             // "HH:MM:SS" → "HH:MM"
      return str ? str.slice(0, 5) : '';
    }

    function unique(arr) {
      return [...new Set(arr.filter(v => v !== undefined))].sort();
    }

    /* global store */
    let allRows = [];

    /* ══════════════════════════════════
       FILE LOADING
       ══════════════════════════════════ */

    const elFileInput   = document.getElementById('file-input');
    const elDropOverlay = document.getElementById('drop-overlay');

    elFileInput.addEventListener('change', e => {
      const f = e.target.files[0];
      if (f) readFile(f);
    });

    window.addEventListener('dragover', e => {
      e.preventDefault();
      elDropOverlay.classList.add('active');
    });
    window.addEventListener('dragleave', e => {
      if (!e.relatedTarget) elDropOverlay.classList.remove('active');
    });
    window.addEventListener('drop', e => {
      e.preventDefault();
      elDropOverlay.classList.remove('active');
      const f = e.dataTransfer.files[0];
      if (f && f.name.endsWith('.csv')) readFile(f);
    });

    function readFile(file) {
      const reader = new FileReader();
      reader.onload = ev => {
        allRows = parseCSV(ev.target.result);
        populateFilters();
        renderReport();
      };
      reader.readAsText(file, 'UTF-8');
    }

    document.getElementById('btn-print').addEventListener('click', () => window.print());

    /* ══════════════════════════════════
       TOGGL LIVE API
       ══════════════════════════════════ */

    document.getElementById('btn-toggl-load').addEventListener('click', loadFromToggl);

    async function loadFromToggl() {
      const token       = document.getElementById('toggl-token').value.trim();
      const workspaceId = document.getElementById('toggl-workspace').value.trim();
      const startDate   = document.getElementById('toggl-from').value;
      const endDate     = document.getElementById('toggl-to').value;
      const statusEl    = document.getElementById('toggl-status');

      if (!token || !workspaceId || !startDate || !endDate) {
        statusEl.textContent = 'Compila tutti i campi.';
        return;
      }

      statusEl.textContent = 'Connessione a Toggl...';
      document.getElementById('btn-toggl-load').disabled = true;

      const auth    = 'Basic ' + btoa(token + ':api_token');
      const base    = 'https://api.track.toggl.com';
      const headers = { 'Authorization': auth, 'Content-Type': 'application/json' };

      try {
        // ── 1. Projects (to resolve project_id → name + client_id) ──
        statusEl.textContent = 'Carico progetti...';
        const projResp = await fetch(
          base + '/api/v9/workspaces/' + workspaceId + '/projects?active=both&per_page=200',
          { headers }
        );
        if (!projResp.ok) throw new Error('Progetti: ' + projResp.status + ' ' + projResp.statusText);
        const projects = await projResp.json();
        const projMap = {};
        projects.forEach(p => { projMap[p.id] = { name: p.name || '', clientId: p.client_id }; });

        // ── 2. Clients (to resolve client_id → name) ──
        statusEl.textContent = 'Carico clienti...';
        const cliResp = await fetch(
          base + '/api/v9/workspaces/' + workspaceId + '/clients',
          { headers }
        );
        const clientMap = {};
        if (cliResp.ok) {
          const clients = await cliResp.json();
          if (Array.isArray(clients)) clients.forEach(c => { clientMap[c.id] = c.name || ''; });
        }

        // ── 3. Time entries (paginated via X-Next-Row-Number) ──
        statusEl.textContent = 'Carico voci...';
        const rawEntries = [];
        let firstRow = 1;

        while (true) {
          const resp = await fetch(
            base + '/reports/api/v3/workspace/' + workspaceId + '/search/time_entries',
            {
              method: 'POST',
              headers,
              body: JSON.stringify({
                start_date: startDate,
                end_date:   endDate,
                page_size:  50,
                first_row_number: firstRow
              })
            }
          );
          if (!resp.ok) throw new Error('Voci: ' + resp.status + ' ' + resp.statusText);
          const page = await resp.json();
          if (!Array.isArray(page) || page.length === 0) break;
          rawEntries.push(...page);
          const nextHeader = resp.headers.get('X-Next-Row-Number');
          if (!nextHeader) break;
          firstRow = parseInt(nextHeader, 10);
          if (isNaN(firstRow)) break;
        }

        // ── 4. Map to allRows format ──
        allRows = [];
        rawEntries.forEach(entry => {
          const proj        = projMap[entry.project_id] || {};
          const projectName = proj.name || '';
          const clientName  = clientMap[proj.clientId] || '';
          const userName    = entry.username || '';
          const tag         = Array.isArray(entry.tags) && entry.tags.length ? entry.tags[0] : '';
          const desc        = entry.description || '';

          (entry.time_entries || []).forEach(te => {
            if (!te.start) return;
            const start = new Date(te.start);
            const stop  = te.stop ? new Date(te.stop) : start;
            const sec   = te.seconds || 0;
            const hh    = String(Math.floor(sec / 3600)).padStart(2, '0');
            const mm    = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
            const ss    = String(sec % 60).padStart(2, '0');

            // Format date/time in local timezone
            const pad = n => String(n).padStart(2, '0');
            const startDateStr = start.getFullYear() + '-' + pad(start.getMonth()+1) + '-' + pad(start.getDate());
            const startTimeStr = pad(start.getHours()) + ':' + pad(start.getMinutes()) + ':' + pad(start.getSeconds());
            const endDateStr   = stop.getFullYear()  + '-' + pad(stop.getMonth()+1)  + '-' + pad(stop.getDate());
            const endTimeStr   = pad(stop.getHours())  + ':' + pad(stop.getMinutes())  + ':' + pad(stop.getSeconds());

            allRows.push({
              'User':       userName,
              'Email':      '',
              'Client':     clientName,
              'Project':    projectName,
              'Task':       '',
              'Description': desc,
              'Billable':   entry.billable ? 'Yes' : 'No',
              'Start date': startDateStr,
              'Start time': startTimeStr,
              'End date':   endDateStr,
              'End time':   endTimeStr,
              'Duration':   hh + ':' + mm + ':' + ss,
              'Tags':       tag
            });
          });
        });

        statusEl.textContent = allRows.length + ' voci caricate.';
        populateFilters();
        renderReport();

      } catch (err) {
        statusEl.textContent = 'Errore: ' + err.message;
        if (err.message.includes('Failed to fetch') || err.message.includes('CORS')) {
          statusEl.textContent += ' (CORS: apri il file da un server locale — vedi sotto)';
        }
      } finally {
        document.getElementById('btn-toggl-load').disabled = false;
      }
    }

    /* ══════════════════════════════════
       POPULATE FILTERS
       ══════════════════════════════════ */

    let filtersWired = false;

    function populateFilters() {
      const rows = allRows;

      // Date range — auto-fill from data
      const dates = rows.map(r => r['Start date']).filter(Boolean).sort();
      if (dates.length) {
        document.getElementById('filter-date-from').value = dates[0];
        document.getElementById('filter-date-to').value   = dates[dates.length - 1];
      }

      // Project dropdown
      const sel = document.getElementById('filter-project');
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      const allOpt = document.createElement('option');
      allOpt.value = '';
      allOpt.textContent = '— tutti —';
      sel.appendChild(allOpt);
      unique(rows.map(r => r['Project'])).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      });
      const projects = unique(rows.map(r => r['Project']));
      if (projects.length === 1) sel.value = projects[0];

      // Checkbox groups
      buildCheckboxes('filter-members', unique(rows.map(r => r['User'])));
      buildCheckboxes('filter-clients', unique(rows.map(r => r['Client'])));
      buildCheckboxes('filter-tags',    unique(rows.map(r => r['Tags'])));

      if (!filtersWired) {
        filtersWired = true;
        document.getElementById('filter-date-from').addEventListener('change', renderReport);
        document.getElementById('filter-date-to').addEventListener('change', renderReport);
        document.getElementById('filter-project').addEventListener('change', renderReport);

        document.querySelectorAll('.toggle-all').forEach(btn => {
          btn.addEventListener('click', () => {
            const map = { members: 'filter-members', clients: 'filter-clients', tags: 'filter-tags' };
            const cbs = document.querySelectorAll('#' + map[btn.dataset.target] + ' input');
            const allChecked = [...cbs].every(cb => cb.checked);
            cbs.forEach(cb => { cb.checked = !allChecked; });
            renderReport();
          });
        });
      }
    }

    function buildCheckboxes(containerId, values) {
      const container = document.getElementById(containerId);
      while (container.firstChild) container.removeChild(container.firstChild);
      values.forEach(val => {
        const lbl = document.createElement('label');
        const cb  = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = val;
        cb.checked = true;
        cb.addEventListener('change', renderReport);
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode('\u00a0' + (val || '—')));
        container.appendChild(lbl);
      });
    }

    function getChecked(containerId) {
      return [...document.querySelectorAll('#' + containerId + ' input[type=checkbox]')]
        .filter(cb => cb.checked).map(cb => cb.value);
    }

    /* ══════════════════════════════════
       FILTER LOGIC
       ══════════════════════════════════ */

    function getFilteredRows() {
      const from    = document.getElementById('filter-date-from').value;
      const to      = document.getElementById('filter-date-to').value;
      const project = document.getElementById('filter-project').value;
      const members = new Set(getChecked('filter-members'));
      const clients = new Set(getChecked('filter-clients'));
      const tags    = new Set(getChecked('filter-tags'));

      return allRows.filter(r => {
        const d = r['Start date'];
        if (from && d < from) return false;
        if (to   && d > to)   return false;
        if (project && r['Project'] !== project) return false;
        if (!members.has(r['User']))   return false;
        if (!clients.has(r['Client'])) return false;
        if (!tags.has(r['Tags']))       return false;
        return true;
      });
    }

    /* ══════════════════════════════════
       REPORT RENDERER
       ══════════════════════════════════ */

    function renderReport() {
      const elEmpty  = document.getElementById('empty-state');
      const elReport = document.getElementById('report');

      if (!allRows.length) {
        elEmpty.style.display  = 'flex';
        elReport.style.display = 'none';
        return;
      }
      elEmpty.style.display  = 'none';
      elReport.style.display = 'block';

      const rows = getFilteredRows();

      // ── Summary ──
      const project = document.getElementById('filter-project').value
        || (rows.length ? rows[0]['Project'] : '');
      document.getElementById('rpt-project').textContent = project;

      const dates = rows.map(r => r['Start date']).filter(Boolean).sort();
      if (dates.length) {
        const lo = fmtDate(dates[0]);
        const hi = fmtDate(dates[dates.length - 1]);
        document.getElementById('rpt-period').textContent = lo === hi ? lo : lo + ' \u2013 ' + hi;
      } else {
        document.getElementById('rpt-period').textContent = '';
      }

      const totalSec = rows.reduce((s, r) => s + durationToSec(r['Duration']), 0);
      document.getElementById('rpt-total').textContent = secToHHMM(totalSec);

      // ── Table ──
      const sorted = [...rows].sort((a, b) => {
        const tp = (a['Tags'] || '').localeCompare(b['Tags'] || '');
        if (tp) return tp;
        const td = (a['Start date'] || '').localeCompare(b['Start date'] || '');
        if (td) return td;
        return (a['Start time'] || '').localeCompare(b['Start time'] || '');
      });

      const tbody = document.getElementById('rpt-tbody');
      while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

      let lastPhase = null;
      let groupBuf  = [];

      function flushGroup() {
        groupBuf.forEach((row, i) => {
          const tr = document.createElement('tr');
          tr.className = 'entry-row' + (i === 0 ? ' group-start' : '');

          function td(text) {
            const el = document.createElement('td');
            el.textContent = text;
            return el;
          }

          tr.appendChild(td(i === 0 ? (row['Tags'] || '—') : ''));
          tr.appendChild(td(row['User'] || ''));
          tr.appendChild(td(row['Description'] || ''));
          tr.appendChild(td(fmtDate(row['Start date'])));
          tr.appendChild(td(fmtTime(row['Start time'])));
          tr.appendChild(td(fmtTime(row['End time'])));
          tr.appendChild(td(fmtTime(row['Duration'])));
          tbody.appendChild(tr);
        });
        groupBuf = [];
      }

      sorted.forEach(row => {
        const phase = row['Tags'] || '';
        if (phase !== lastPhase) { flushGroup(); lastPhase = phase; }
        groupBuf.push(row);
      });
      flushGroup();

      // Total row
      const trTotal = document.createElement('tr');
      trTotal.className = 'total-row';
      const tdLabel = document.createElement('td');
      tdLabel.colSpan = 6;
      tdLabel.textContent = 'TOTAL';
      const tdVal = document.createElement('td');
      tdVal.textContent = secToHHMM(totalSec);
      trTotal.appendChild(tdLabel);
      trTotal.appendChild(tdVal);
      tbody.appendChild(trTotal);
    }
  </script>

</body>
</html>
